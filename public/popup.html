<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ai Notice</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f8fafc;
      color: #0f172a;
    }
    
    .popup-container {
      padding: 16px;
    }
    
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #e2e8f0;
    }
    
    .header img {
      width: 32px;
      height: 32px;
    }
    
    .header h1 {
      font-size: 18px;
      font-weight: 600;
      color: #0f172a;
    }
    
    .status {
      background: #fff;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
      border: 1px solid #e2e8f0;
    }
    
    .status-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
    }
    
    .status-label {
      font-size: 13px;
      color: #475569;
    }
    
    .status-value {
      font-size: 13px;
      font-weight: 500;
    }
    
    .status-active {
      color: #16a34a;
    }
    
    .status-inactive {
      color: #dc2626;
    }
    
    .info {
      font-size: 12px;
      color: #475569;
      text-align: center;
      padding: 8px;
    }
    
    .version {
      font-size: 11px;
      color: #64748b;
      text-align: center;
      margin-top: 8px;
    }

    /* calm business-routing footer (orientation surface only).
       Subtle, non-disruptive; routes work/team users to the website. Not enforcement. */
    .business {
      font-size: 11px;
      color: #64748b;
      text-align: center;
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid #e2e8f0;
    }

    .business a {
      color: #475569;
      text-decoration: none;
    }

    .business a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="popup-container">
    <div class="header">
      <img src="icons/icon32.png" alt="Ai Notice">
      <h1>Ai Notice</h1>
    </div>
    
    <div class="status">
      <div class="status-row">
        <span class="status-label">Protection</span>
        <span class="status-value status-active">Active</span>
      </div>
      <div class="status-row">
        <span class="status-label">Mode</span>
        <span class="status-value">Awareness</span>
      </div>
    </div>
    
    <div class="info">
      Risk awareness notifications are enabled for AI platforms.
    </div>
    
    <div class="version">v1.0.0</div>

    <div class="business">
      Using Ai Notice at work? Visit <a href="https://ainotice.app" target="_blank" rel="noopener">ainotice.app</a>
    </div>
  </div>
</body>
</html>
